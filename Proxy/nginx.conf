user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
	worker_connections  1024;
}

http {
	include       /etc/nginx/mime.types;
	default_type  application/octet-stream;
	sendfile        on;
	keepalive_timeout  65;

	upstream option_up {
		server optionservice:8000;
	}

	upstream prompt_up {
		server generatepromptservice:8001;
	}

	upstream model_up {
		server generate3dmodelservice:8000;
	}

	server {
		listen 80;
		server_name _;

		location /option/ {
			proxy_pass http://option_up/;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		}

		location /prompt/ {
			proxy_pass http://prompt_up/;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		}

		location /model/ {
			proxy_pass http://model_up/;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		}

		# Increase upload size and timeouts for model generation
		client_max_body_size 50m;
		proxy_connect_timeout 30s;
		proxy_send_timeout 120s;
		proxy_read_timeout 120s;

		location / {
			add_header Content-Type text/plain;
			return 200 'API Gateway';
		}
	}
}

