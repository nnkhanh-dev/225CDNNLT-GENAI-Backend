services:
  postgres:
    image: postgres:15
    restart: always
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-optionsdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - optionnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optionsdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  optionservice:
    build:
      context: ./OptionService
    restart: always
    env_file:
      - ./OptionService/src/.env
    volumes:
      - ../UploadedDocuments:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - optionnet

  generatepromptservice:
    build:
      context: ./GeneratePromptService
    env_file:
      - ./GeneratePromptService/src/.env
    volumes:
      - ../UploadedDocuments:/app/uploads
      - ../UploadedDocuments:/uploads
    networks:
      - optionnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  generate3dmodelservice:
    build:
      context: ./Generate3DModelService
    env_file:
      - ./Generate3DModelService/src/.env
    volumes:
      - ../ModelsData:/app/models
    networks:
      - optionnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    build:
      context: ./Proxy
    ports:
      - "8888:80"
    depends_on:
      - optionservice
      - generatepromptservice
      - generate3dmodelservice
    volumes:
      - ../ModelsData:/usr/share/nginx/html/models
    networks:
      - optionnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:

networks:
  optionnet:
    driver: bridge
